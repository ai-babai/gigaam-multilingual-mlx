name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  behavior-and-package:
    name: Python ${{ matrix.python-version }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and release tooling
        run: python -m pip install --disable-pip-version-check '.[dev]'

      - name: Check formatting and lint
        run: |
          ruff format --check .
          ruff check .

      - name: Run behavior tests
        run: pytest -q

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke-test CLI from the built wheel
        run: |
          python -m venv "$RUNNER_TEMP/wheel-smoke"
          "$RUNNER_TEMP/wheel-smoke/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/wheel-smoke/bin/gigaam-mlx" --version
          "$RUNNER_TEMP/wheel-smoke/bin/gigaam-mlx" --help
          "$RUNNER_TEMP/wheel-smoke/bin/gigaam-mlx" models --json
