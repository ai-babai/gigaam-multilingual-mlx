name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: macos-14
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION=$(python -c 'import runpy; print(runpy.run_path("src/gigaam_mlx/_version.py")["__version__"])')
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"

      - name: Build and validate distributions
        run: |
          python -m pip install --disable-pip-version-check 'build>=1.3,<2' 'twine>=6.1,<7'
          python -m build
          python -m twine check dist/*

      - name: Upload immutable distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: macos-14
    environment:
      name: pypi
      url: https://pypi.org/project/gigaam-mlx/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions from build job
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: python-distributions
          path: dist/

      # PyPA's official publisher action is pinned to the current release/v1 commit.
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
